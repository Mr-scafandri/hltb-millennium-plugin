name: HLTB API Monitor

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at noon UTC
  workflow_dispatch:

jobs:
  check-api:
    runs-on: ubuntu-latest
    steps:
      - name: Check init endpoint
        id: init
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Referer: https://howlongtobeat.com/" \
            "https://howlongtobeat.com/api/find/init?t=$(date +%s%3N)")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Init HTTP status: $HTTP_CODE"

          echo "status=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "body=$BODY" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Init endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.token // empty')
          HP_KEY=$(echo "$BODY" | jq -r '.hpKey // empty')
          HP_VAL=$(echo "$BODY" | jq -r '.hpVal // empty')

          echo "Token length: ${#TOKEN}"
          echo "hpKey: $HP_KEY"
          echo "hpVal: $HP_VAL"

          if [ -z "$TOKEN" ] || [ -z "$HP_KEY" ] || [ -z "$HP_VAL" ]; then
            echo "::error::Init response missing expected fields. Body: $BODY"
            exit 1
          fi

          echo "Init check passed"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "hp_key=$HP_KEY" >> "$GITHUB_OUTPUT"
          echo "hp_val=$HP_VAL" >> "$GITHUB_OUTPUT"

      - name: Check search endpoint
        run: |
          TOKEN="${{ steps.init.outputs.token }}"
          HP_KEY="${{ steps.init.outputs.hp_key }}"
          HP_VAL="${{ steps.init.outputs.hp_val }}"

          PAYLOAD=$(jq -n \
            --arg key "$HP_KEY" \
            --arg val "$HP_VAL" \
            '{
              searchType: "games",
              searchTerms: ["Dark", "Souls"],
              searchPage: 1,
              size: 5,
              searchOptions: {
                games: {
                  userId: 0,
                  platform: "",
                  sortCategory: "popular",
                  rangeCategory: "main",
                  rangeTime: { min: 0, max: 0 },
                  gameplay: { perspective: "", flow: "", genre: "", difficulty: "" },
                  rangeYear: { max: "", min: "" },
                  modifier: ""
                },
                users: { sortCategory: "postcount" },
                lists: { sortCategory: "follows" },
                filter: "",
                sort: 0,
                randomizer: 0
              },
              useCache: true
            } + { ($key): $val }')

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Origin: https://howlongtobeat.com" \
            -H "Referer: https://howlongtobeat.com/" \
            -H "x-auth-token: $TOKEN" \
            -H "x-hp-key: $HP_KEY" \
            -H "x-hp-val: $HP_VAL" \
            "https://howlongtobeat.com/api/find" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Search HTTP status: $HTTP_CODE"
          echo "status=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Search endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

          RESULT_COUNT=$(echo "$BODY" | jq -r '.data | length')
          echo "Search results: $RESULT_COUNT"

          if [ "$RESULT_COUNT" = "0" ] || [ "$RESULT_COUNT" = "null" ]; then
            echo "::error::Search returned no results for 'Dark Souls'"
            exit 1
          fi

          echo "Search check passed"
